<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заказ оформлен — Terra Floor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Work+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B1108; --walnut:#4A2E18; --clay:#C1652E; --clay-dark:#9C4D20;
    --gold:#B98B3E; --linen:#F3ECDF; --linen-dark:#E8DDC8; --bark:#2B2118; --bark-soft:#5A4B3D;
    --radius:14px; --max:1180px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--linen);color:var(--bark);font-family:'Work Sans', sans-serif;font-size:16px;line-height:1.6;}
  h1,h2,h3{font-family:'Fraunces', serif;font-weight:600;margin:0;color:var(--ink);}
  .num{font-family:'Space Grotesk', sans-serif;font-weight:600;}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 32px;}
  a{color:inherit;text-decoration:none;}

  .site-header{position:sticky;top:0;z-index:50;background:rgba(243,236,223,0.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--linen-dark);}
  .site-header .wrap{display:flex;align-items:center;justify-content:space-between;height:76px;}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo-mark{width:34px;height:34px;}
  .logo-text{font-family:'Fraunces', serif;font-weight:600;font-size:20px;color:var(--ink);}
  .logo-text span{display:block;font-family:'Work Sans',sans-serif;font-weight:500;font-size:10px;letter-spacing:3px;color:var(--clay-dark);}
  nav{display:flex;gap:28px;}
  nav a{font-size:14px;font-weight:500;color:var(--bark-soft);}
  nav a.active{color:var(--clay-dark);}
  .phone{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;}
  .phone small{display:block;font-family:'Work Sans',sans-serif;font-weight:400;font-size:11px;color:var(--bark-soft);}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 24px;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:transform .2s, background .2s, border-color .2s;font-family:'Work Sans',sans-serif;}
  .btn-primary{background:var(--clay);color:var(--linen);}
  .btn-primary:hover{background:var(--clay-dark);transform:translateY(-2px);}
  .btn-ghost-dark{border-color:var(--bark-soft);color:var(--ink);}
  .btn-ghost-dark:hover{border-color:var(--ink);}
  .btn-block{width:100%;}

  .breadcrumb{padding:20px 0 0;font-size:13px;color:var(--bark-soft);}
  .breadcrumb span{margin:0 6px;opacity:.5;}

  .page-head{padding:14px 0 36px;}
  .page-head h1{font-size:clamp(30px,4vw,42px);}
  .page-head p{color:var(--bark-soft);margin-top:10px;max-width:560px;}

  footer{background:var(--ink);color:#B7A88E;padding:48px 0 28px;margin-top:48px;}
  .footer-bottom{display:flex;justify-content:space-between;font-size:12.5px;color:#7C7058;}

  .cart-link{position:relative;display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;border:1.5px solid var(--linen-dark);color:var(--ink);transition:border-color .2s;}
  .cart-link:hover{border-color:var(--clay);}
  .cart-link svg{width:18px;height:18px;}
  .cart-badge{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;border-radius:999px;background:var(--clay);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:10.5px;font-weight:600;display:none;align-items:center;justify-content:center;padding:0 4px;}

  @media (max-width:900px){
    nav{display:none;}
    .wrap{padding:0 20px;}
  }


  .confirm-section{padding:48px 0 80px;}
  .confirm-card{max-width:680px;margin:0 auto;text-align:center;}
  .check-circle{width:64px;height:64px;border-radius:50%;background:var(--clay);color:var(--linen);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:28px;}
  .confirm-card h1{font-size:clamp(26px,3.4vw,34px);margin-bottom:10px;}
  .confirm-card p.lead{color:var(--bark-soft);font-size:15.5px;margin-bottom:30px;}
  .order-number{display:inline-block;background:var(--linen-dark);border-radius:999px;padding:8px 18px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:var(--ink);margin-bottom:30px;}

  .stepper{display:flex;justify-content:center;gap:0;padding:0 0 40px;}
  .step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--bark-soft);}
  .step .dot{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--linen-dark);display:flex;align-items:center;justify-content:center;font-size:12px;font-family:'Space Grotesk',sans-serif;}
  .step.done{color:var(--ink);font-weight:600;}
  .step.done .dot{background:var(--ink);border-color:var(--ink);color:var(--linen);}
  .step-line{width:46px;height:1px;background:var(--linen-dark);margin:0 12px;align-self:center;}

  .order-summary{background:#fff;border:1px solid var(--linen-dark);border-radius:var(--radius);padding:28px;text-align:left;margin-bottom:24px;}
  .order-summary h2{font-size:17px;margin-bottom:16px;}
  .order-row{display:flex;justify-content:space-between;gap:16px;padding:10px 0;border-bottom:1px solid var(--linen-dark);font-size:14px;}
  .order-row:last-child{border-bottom:none;}
  .order-row .name{color:var(--ink);}
  .order-row .meta{color:var(--bark-soft);font-size:12.5px;}
  .order-total-row{display:flex;justify-content:space-between;padding-top:14px;margin-top:6px;border-top:2px solid var(--ink);font-size:17px;}
  .order-total-row .num{color:var(--clay-dark);}

  .next-steps{background:var(--linen-dark);border-radius:var(--radius);padding:24px;text-align:left;margin-bottom:32px;}
  .next-steps h3{font-size:15px;margin-bottom:10px;}
  .next-steps ol{margin:0;padding-left:20px;font-size:14px;color:var(--bark-soft);}
  .next-steps li{margin-bottom:6px;}

  .empty-order{text-align:center;color:var(--bark-soft);padding:40px 0;}

</style>
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a href="index.html" style="text-decoration:none;display:contents;">
    <div class="logo">
      <svg class="logo-mark" viewBox="0 0 100 100">
        <g transform="translate(50,50)">
          <rect x="-6" y="-44" width="12" height="28" rx="2" fill="#C1652E" transform="rotate(0)"/>
          <rect x="-6" y="-44" width="12" height="28" rx="2" fill="#B98B3E" transform="rotate(45)"/>
          <rect x="-6" y="-44" width="12" height="28" rx="2" fill="#C1652E" transform="rotate(90)"/>
          <rect x="-6" y="-44" width="12" height="28" rx="2" fill="#B98B3E" transform="rotate(135)"/>
          <rect x="-6" y="-44" width="12" height="28" rx="2" fill="#C1652E" transform="rotate(180)"/>
          <rect x="-6" y="-44" width="12" height="28" rx="2" fill="#B98B3E" transform="rotate(225)"/>
          <rect x="-6" y="-44" width="12" height="28" rx="2" fill="#C1652E" transform="rotate(270)"/>
          <rect x="-6" y="-44" width="12" height="28" rx="2" fill="#B98B3E" transform="rotate(315)"/>
          <circle r="13" fill="#F3ECDF"/>
        </g>
      </svg>
      <div class="logo-text">Terra Floor<span>Дизайнерские полы</span></div>
    </div>
    </a>
    <nav>
      <a href="terra_floor_catalog_concept.html">Ламинат</a>
      <a href="terra_floor_engineered_board_concept.html">Инженерная доска</a>
      <a href="terra_floor_accessories_concept.html">Аксессуары</a>
      <a href="terra_floor_contacts_concept.html">Контакты</a>
    </nav>
    <div class="phone">8 800 555-01-23<small>ежедневно, 9:00–21:00</small></div>
      <a href="terra_floor_cart_checkout_concept.html" class="cart-link" aria-label="Корзина">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" data-cart-badge>0</span>
      </a>
  </div>
</header>

<div class="wrap confirm-section">
  <div class="stepper">
    <div class="step done"><span class="dot">✓</span>Корзина</div>
    <span class="step-line"></span>
    <div class="step done"><span class="dot">✓</span>Доставка и оплата</div>
    <span class="step-line"></span>
    <div class="step done"><span class="dot">✓</span>Подтверждение</div>
  </div>

  <div class="confirm-card" id="confirm-card">
    <!-- содержимое подставляется JS из последнего оформленного заказа -->
  </div>
</div>

<footer>
  <div class="wrap">
    <div class="footer-bottom">
      <span>© 2026 Terra Floor. Все права защищены.</span>
      <span>Подтверждение заказа</span>
    </div>
  </div>
</footer>


<script>
  function fmt(n){ return Math.round(n).toLocaleString('ru-RU') + ' ₽'; }

  function render(){
    const card = document.getElementById('confirm-card');
    let order = null;
    try { order = JSON.parse(localStorage.getItem('tf_last_order')); } catch(e){}

    if (!order || !order.items || order.items.length === 0) {
      card.innerHTML = `
        <div class="empty-order">
          <h1>Заказ не найден</h1>
          <p style="margin:14px 0 26px;">Похоже, вы попали на эту страницу напрямую — оформленных заказов пока нет.</p>
          <a href="terra_floor_catalog_concept.html" class="btn btn-primary">Перейти в каталог</a>
        </div>`;
      return;
    }

    const itemsHtml = order.items.map(i => `
      <div class="order-row">
        <div>
          <div class="name">${i.name}</div>
          <div class="meta">${i.qty} × ${fmt(i.price)} / ${i.unit || 'шт.'}</div>
        </div>
        <div class="num">${fmt(i.price * i.qty)}</div>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="check-circle">✓</div>
      <h1>Спасибо, ${order.customer.name.split(' ')[0] || ''}! Заказ оформлен</h1>
      <p class="lead">Мы получили заказ и свяжемся с вами по телефону ${order.customer.phone} для подтверждения деталей доставки.</p>
      <div class="order-number">№ ${order.orderNumber}</div>

      <div class="order-summary">
        <h2>Состав заказа</h2>
        ${itemsHtml}
        <div class="order-total-row">
          <span>Итого к оплате</span>
          <span class="num">${fmt(order.total)}</span>
        </div>
      </div>

      <div class="next-steps">
        <h3>Что дальше</h3>
        <ol>
          <li>Менеджер свяжется с вами в течение рабочего дня для подтверждения заказа${order.delivery ? ' и уточнения деталей доставки (' + order.delivery + ')' : ''}.</li>
          <li>Оплата — ${order.payment || 'способ уточняется при подтверждении'}.</li>
          <li>После подтверждения вы получите ориентировочную дату доставки или дату готовности к самовывозу.</li>
        </ol>
      </div>

      <a href="index.html" class="btn btn-ghost-dark">Вернуться на главную</a>
    `;
  }

  document.addEventListener('DOMContentLoaded', render);
</script>

<script src="cart.js"></script>
</body>
</html>
